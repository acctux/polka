[mgr]
show_hidden = false
sort_by = "alphabetical"
sort_dir_first = true
linemode = "size_and_mtime"

[[plugin.prepend_previewers]]
mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}"
run = "ouch"

[opener]
imv = [{ run = "imv %s", orphan = true, for = "unix" }]

[open]
prepend_rules = [{ mime = "image/*", use = "imv" }]
