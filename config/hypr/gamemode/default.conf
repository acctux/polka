
$mainMod = SUPER
# Looknfeel
general {
  gaps_in = 3
  gaps_out = 0
  border_size = 1
  col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
  col.inactive_border = rgba(0,114,255,0.7) rgba(252,252,252,0.7) 45deg
  resize_on_border = true
  # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
  allow_tearing = false
  layout = dwindle
}
decoration {
  rounding = 10
  active_opacity = 0.95
  inactive_opacity = 0.75
  fullscreen_opacity = 1.0
  blur {
    enabled = true
    size = 2
    passes = 2
    ignore_opacity = true
  }
  shadow {
    enabled = true
    range = 2
    render_power = 2
    color = rgba(8, 8, 10, 1)
  }
}
animations {
    enabled = true
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = stall, 1, -0.1, 0.7, 0.85
    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 2, emphasizedDecel, popin 90%
    animation = fadeOut, 1, 2, emphasizedDecel
    animation = windowsMove, 1, 3, emphasizedDecel, slide
    animation = border, 1, 10, emphasizedDecel
    animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 1, 2.4, menu_accel, popin 94%
    animation = fadeLayersIn, 1, 0.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, stall
    animation = workspaces, 1, 7, menu_decel, slide
    animation = specialWorkspaceIn, 1, 2.8, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
    animation = zoomFactor, 1, 3, standardDecel
}
dwindle {
  pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = true # You probably want this
  force_split = 2 # Always split on the right
}
gesture = 3, horizontal, workspace
binds {
  allow_workspace_cycles = true
}
# master {
#   new_status = master
# }
##################################################
# MOUSE WINDOW CONTROL
##################################################
bindm = SHIFT, mouse:273, movewindow
bindm = SHIFT, mouse:272, resizewindow

layerrule {
  name = swaync-control-center
  match:class = swaync-control-center
  blur_popups = on
  blur = on
  ignore_alpha = 0.1
}
layerrule {
  name = swaync-notification-window
  match:class = swaync-notification-window
  blur_popups = on
  blur = on
  ignore_alpha = 0.1
}
layerrule {
  name = waybar
  match:class = waybar
  blur = on
  blur_popups = on
  ignore_alpha = 0.1
}
layerrule {
  name = fuzzel
  match:class = fuzzel
  blur_popups = on
  blur = on
  ignore_alpha = 0.1
}
windowrule {
  name = pavu
  match:class = (.*org.pulseaudio.pavucontrol.*)
  float = on
  size = 700 600
}
windowrule {
  name = imv
  match:class = imv
  float = on
  size = 1000 800
}
windowrule {
  name = qjournalctl
  match:class = qjournalctl
  float = on
  size = 1000 800
}
windowrule {
  name = zenity
  match:class = zenity
  float = on
  center = on
}
windowrule {
  name = simplecal
  match:class = ^(gsimplecal)$
  move = 1686 25
  float = on
}
windowrule {
  name = save
  match:title = ^(Authentication Required|Unlock Keyring|Login|qt-sudo)$
  float = on
  center = on
}
windowrule {
  name = save
  match:title = ^Opening*
  float = on
  center = on
}
windowrule {
  name = xdg-desktop-portal-gtk
  match:class = xdg-desktop-portal-gtk
  float = on
  center = on
}
windowrule {
  name = Nautilus
  match:class = org.gnome.Nautilus
  float = on
  center = on
}
windowrule {
  name = Nautilus
  match:class = org.gnome.baobab
  float = on
  center = on
  size = 1000 800
}
### Opacity Overrides
windowrule = match:class ^(steam_app_default)$, opacity 1.0 override 1.0 override
windowrule = match:class ^(com.ayugram.desktop)$, opacity 1.0 override 1.0 override
windowrule = match:class ^(eden)$, opacity 1.0 override 1.0 override
windowrule = match:class ^(Ryujinx)$, opacity 1.0 override 1.0 override
windowrule = match:class ^(mpv)$, opacity 1.0 override 1.0 override
windowrule = match:class ^(rpcs3)$, opacity 1.0 override 1.0 override
windowrule = match:title .*YouTube.*, opacity 1.0 override 1.0 override
windowrule = match:title .*Concept Videos.*, opacity 1.0 override 1.0 override
windowrule = match:title .*FlickyStream.*, opacity 1.0 override 1.0 override

